<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casanis Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #060606;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      text-align: center;
      padding: 16px 20px 4px;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.2s forwards;
      flex-shrink: 0;
    }
    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      font-weight: 700;
    }
    .header h1 span { color: #c9a96e; }
    .header p {
      font-size: 13px;
      color: #555;
      margin-top: 6px;
    }

    .phones {
      display: flex;
      gap: 40px;
      align-items: center;
      padding: 12px 20px 8px;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.5s forwards;
    }

    .col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .col-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #666;
    }
    .col-label.accent { color: #c9a96e; }

    /* Phone */
    .frame {
      height: calc(100vh - 160px);
      aspect-ratio: 375 / 812;
      border-radius: 44px;
      border: 3px solid #222;
      overflow: hidden;
      position: relative;
      background: #000;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.03),
        0 30px 80px rgba(0,0,0,0.7);
      clip-path: inset(0 round 44px);
      -webkit-clip-path: inset(0 round 44px);
    }
    .frame::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 32px;
      background: #000;
      border-radius: 0 0 18px 18px;
      z-index: 100;
    }
    .frame.light { background: #faf9f7; }
    .frame.light::before { background: #faf9f7; }

    .frame iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .footer {
      text-align: center;
      padding: 6px 20px 12px;
      opacity: 0;
      animation: fadeIn 0.8s ease 1s forwards;
      flex-shrink: 0;
    }
    .footer p { font-size: 12px; color: #333; }
    .footer .brand { color: #c9a96e; font-weight: 600; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 860px) {
      .phones { gap: 24px; }
      .frame { border-radius: 46px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1><span>Casanis Group</span></h1>
    <p>Site web & application mobile</p>
  </div>

  <div class="phones">
    <div class="col">
      <div class="col-label">Le site</div>
      <div class="frame">
        <iframe src="https://casanisgroup.eu/fr/holding-dans-le-secteur-du-luxe/" loading="lazy"></iframe>
      </div>
    </div>

    <div class="col">
      <div class="col-label accent">L'application</div>
      <div class="frame light">
        <iframe src="app.html" loading="lazy"></iframe>
      </div>
    </div>
  </div>

  <div class="footer">
    <p>Proposition par <span class="brand">Spynners Lab</span> &middot; spynnerslab.com</p>
  </div>

</body>
</html>
